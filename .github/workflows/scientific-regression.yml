name: Scientific Regression
on:
  workflow_dispatch:
  push:
    paths:
      - "calo_rpd_studio/power_system/**"
      - "calo_rpd_studio/orpd/**"
      - "tests/scientific/**"
jobs:
  scientific:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q tests/scientific tests/regression
